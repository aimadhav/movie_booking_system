services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-booking-postgres
    environment:
      POSTGRES_DB: movie_booking
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

